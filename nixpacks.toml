[phases.setup]
nixPkgs = ["nodejs_22"]

[variables]
NPM_CONFIG_ENGINE_STRICT = "false"
NPM_CONFIG_OPTIONAL = "true"
NPM_CONFIG_AUDIT = "false"
NPM_CONFIG_FUND = "false"

[phases.install]
cmds = [
  "npm ci --include=dev --include=optional",
  "npm install --no-save --package-lock=false --include=dev --include=optional @oxc-parser/binding-linux-x64-gnu@0.117.0 @oxc-transform/binding-linux-x64-gnu@0.117.0 @oxc-minify/binding-linux-x64-gnu@0.117.0 @rollup/rollup-linux-x64-gnu@4.59.0"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node .output/server/index.mjs"
